<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Saranga AI Astro...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #0a0a26;
            color: white;
            text-align: center;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #a91079;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .buttons { display: none; margin-top: 20px; gap: 10px; flex-direction: column; }
        .btn {
            background: #a91079;
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            min-width: 200px;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader"></div>
    <h2 id="status">Finding the right store for you...</h2>
    
    <div id="fallback" class="buttons">
        <p>If you weren't redirected automatically, please choose your store:</p>
        <a href="https://apps.apple.com/app/id6743130637" class="btn">App Store (iOS)</a>
        <a href="https://play.google.com/store/apps/details?id=com.saranga.saranga_app" class="btn">Google Play (Android)</a>
    </div>

    <script>
        const iosUrl = "https://apps.apple.com/app/id6743130637";
        const androidUrl = "https://play.google.com/store/apps/details?id=com.saranga.saranga_app";

        function redirect() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // iOS detection
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.replace(iosUrl);
                return;
            }

            // Android detection
            if (/android/i.test(userAgent)) {
                window.location.replace(androidUrl);
                return;
            }

            // If desktop or unknown, show buttons after 2 seconds
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status').innerText = "Welcome to Saranga AI Astro";
            document.getElementById('fallback').style.display = 'flex';
        }

        // Run on load
        window.onload = redirect;
        
        // Safety timeout to show buttons if redirect hangs
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('fallback').style.display = 'flex';
        }, 3000);
    </script>
</body>
</html>
