<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Saranga AI Astro</title>
    <!-- Dynamic Meta Tags will be injected here by JS -->

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            950: '#0a0a26',
                            900: '#1a1a40',
                            800: '#2e0249',
                        },
                        accent: '#a91079',
                        premium: '#570a57'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dark .glass {
            background: rgba(26, 26, 64, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glow {
            box-shadow: 0 0 20px rgba(169, 16, 121, 0.3);
        }

        /* Markdown Styling (Typography) */
        .markdown-body {
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
        }

        .markdown-body h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: #111827;
        }

        .dark .markdown-body h1 {
            color: #f9fafb;
        }

        .markdown-body h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 3rem;
            margin-bottom: 1rem;
            color: #1f2937;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 0.5rem;
        }

        .dark .markdown-body h2 {
            color: #f3f4f6;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .markdown-body p {
            margin-bottom: 1.5rem;
            color: #4b5563;
            font-size: 1.125rem;
        }

        .dark .markdown-body p {
            color: #d1d5db;
        }

        .markdown-body ul {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
            list-style-type: disc;
            color: #4b5563;
        }

        .dark .markdown-body ul {
            color: #d1d5db;
        }

        .markdown-body li {
            margin-bottom: 0.5rem;
        }

        .markdown-body blockquote {
            border-left: 4px solid #a91079;
            padding: 1.5rem;
            margin: 2rem 0;
            background: rgba(169, 16, 121, 0.05);
            border-radius: 0 0.5rem 0.5rem 0;
            color: #374151;
            font-style: italic;
        }

        .dark .markdown-body blockquote {
            background: rgba(169, 16, 121, 0.15);
            color: #e5e7eb;
        }

        .markdown-body strong {
            font-weight: 600;
            color: #111827;
        }

        .dark .markdown-body strong {
            color: #f9fafb;
        }

        .markdown-body hr {
            margin: 3rem 0;
            border-color: #e5e7eb;
        }

        .dark .markdown-body hr {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .markdown-body a {
            color: #a91079;
            text-decoration: none;
            font-weight: 600;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        /* Loader */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #a91079;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<!-- Default to dark mode logically, matches main site preference -->

<body
    class="font-sans antialiased text-gray-900 bg-gray-50 dark:bg-indigo-950 dark:text-gray-100 transition-colors duration-300 dark">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass duration-300 border-b border-gray-200 dark:border-white/10" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-3">
                    <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                        <div
                            class="w-10 h-10 rounded-xl bg-gradient-to-br from-premium to-accent flex items-center justify-center text-white font-bold text-xl shadow-lg glow">
                            S
                        </div>
                        <span class="font-serif font-bold text-2xl tracking-tight text-gray-900 dark:text-white">Saranga
                            AI Astro</span>
                    </a>
                </div>
                <div class="flex items-center gap-6">
                    <!-- Language Toggle -->
                    <div class="flex items-center bg-gray-200 dark:bg-white/10 rounded-full p-1"
                        id="lang-toggle-container">
                        <button id="lang-en"
                            class="px-4 py-1.5 rounded-full text-sm font-semibold transition-all bg-white text-gray-900 shadow-sm dark:bg-premium dark:text-white"
                            onclick="switchLang('en')">EN</button>
                        <button id="lang-ta"
                            class="px-4 py-1.5 rounded-full text-sm font-semibold transition-all text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white"
                            onclick="switchLang('ta')">தமிழ்</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="pt-32 pb-20 min-h-screen">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">

            <!-- Loading State -->
            <div id="loading" class="flex flex-col items-center justify-center py-20">
                <div class="loader mb-4"></div>
                <p class="text-gray-500 dark:text-gray-400">Loading cosmic insights...</p>
            </div>

            <!-- Error State -->
            <div id="error-state" class="hidden text-center py-20">
                <i class="fas fa-exclamation-circle text-4xl text-accent mb-4"></i>
                <h2 class="text-2xl font-serif font-bold mb-2">Blog Not Found</h2>
                <p class="text-gray-500 dark:text-gray-400 mb-6">The stars could not locate the article you are looking
                    for.</p>
                <a href="/"
                    class="inline-block px-6 py-3 rounded-full bg-gradient-to-r from-premium to-accent text-white font-semibold hover:glow transition-all">Return
                    Home</a>
            </div>

            <!-- Blog Content -->
            <article id="blog-content" class="markdown-body hidden opacity-0 transition-opacity duration-500">
                <!-- Content injected by JS -->
            </article>

        </div>
    </main>

    <!-- App CTA Footer (Web Only, usually hidden in WebView if needed) -->
    <section class="border-t border-gray-200 dark:border-white/10 bg-white dark:bg-indigo-900/50 py-12" id="app-cta">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h2 class="text-2xl font-serif font-bold mb-4">Want Daily Astrological Insights?</h2>
            <p class="text-gray-600 dark:text-gray-300 mb-6">Get personalized Panchangam, daily horoscopes, and chat
                with our Vedic AI directly on your phone.</p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="https://apps.apple.com/app/id6743130637"
                    class="px-8 py-3 rounded-full bg-black text-white font-semibold hover:bg-gray-800 transition-colors flex items-center justify-center gap-2">
                    <i class="fab fa-apple text-xl"></i> App Store
                </a>
                <a href="https://play.google.com/store/apps/details?id=com.saranga.saranga_app"
                    class="px-8 py-3 rounded-full bg-black text-white font-semibold hover:bg-gray-800 transition-colors flex items-center justify-center gap-2">
                    <i class="fab fa-google-play text-xl"></i> Google Play
                </a>
            </div>
        </div>
    </section>

    <script>
        // --- State Management ---
        const urlParams = new URLSearchParams(window.location.search);
        const currentPost = urlParams.get('post');
        let currentLang = urlParams.get('lang') || localStorage.getItem('blog_lang') || 'en';

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            initSystemTheme();
            updateLangUI(currentLang);

            if (!currentPost) {
                showError();
                return;
            }

            loadBlog(currentPost, currentLang);
        });

        // --- Core Functions ---
        async function loadBlog(postId, lang) {
            const contentDiv = document.getElementById('blog-content');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error-state');

            // Reset UI
            contentDiv.classList.add('hidden');
            contentDiv.classList.remove('opacity-100');
            errorDiv.classList.add('hidden');
            loadingDiv.classList.remove('hidden');

            try {
                // Construct path: /blogs/{post}/index_{lang}.md
                const response = await fetch(`/blogs/${postId}/index_${lang}.md`);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const markdownText = await response.text();

                // Parse frontmatter (very basic parser)
                const parsed = parseFrontmatter(markdownText);

                // Update Meta Tags
                updateMetaTags(parsed.data);

                // Render Markdown to HTML
                contentDiv.innerHTML = marked.parse(parsed.content);

                // Show Content
                loadingDiv.classList.add('hidden');
                contentDiv.classList.remove('hidden');
                // Small delay to allow CSS transition
                setTimeout(() => contentDiv.classList.add('opacity-100'), 50);

                // Update URL without reloading
                const newUrl = new URL(window.location);
                newUrl.searchParams.set('lang', lang);
                window.history.replaceState({}, '', newUrl);

            } catch (error) {
                console.error("Failed to load blog:", error);
                loadingDiv.classList.add('hidden');
                errorDiv.classList.remove('hidden');
            }
        }

        // --- Language Switching ---
        function switchLang(lang) {
            if (lang === currentLang) return;
            currentLang = lang;
            localStorage.setItem('blog_lang', lang);
            updateLangUI(lang);

            if (currentPost) {
                loadBlog(currentPost, lang);
            }
        }

        function updateLangUI(lang) {
            const btnEn = document.getElementById('lang-en');
            const btnTa = document.getElementById('lang-ta');

            const activeClasses = ['bg-white', 'text-gray-900', 'shadow-sm', 'dark:bg-premium', 'dark:text-white'];
            const inactiveClasses = ['text-gray-500', 'hover:text-gray-900', 'dark:text-gray-400', 'dark:hover:text-white'];

            // Remove all
            btnEn.classList.remove(...activeClasses, ...inactiveClasses);
            btnTa.classList.remove(...activeClasses, ...inactiveClasses);

            if (lang === 'en') {
                btnEn.classList.add(...activeClasses);
                btnTa.classList.add(...inactiveClasses);
            } else {
                btnTa.classList.add(...activeClasses);
                btnEn.classList.add(...inactiveClasses);
            }
        }

        // --- Utilities ---
        function showError() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
        }

        function parseFrontmatter(text) {
            const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
            if (!match) return { data: {}, content: text };

            const frontmatterString = match[1];
            const content = match[2];

            const data = {};
            frontmatterString.split('\n').forEach(line => {
                const parts = line.split(':');
                if (parts.length >= 2) {
                    const key = parts[0].trim();
                    const value = parts.slice(1).join(':').trim().replace(/^["']|["']$/g, ''); // Remove quotes
                    data[key] = value;
                }
            });

            return { data, content };
        }

        function updateMetaTags(meta) {
            if (meta.title) {
                document.title = `${meta.title} | Saranga AI Astro`;
            }
            if (meta.meta_description) {
                let metaDesc = document.querySelector('meta[name="description"]');
                if (!metaDesc) {
                    metaDesc = document.createElement('meta');
                    metaDesc.name = "description";
                    document.head.appendChild(metaDesc);
                }
                metaDesc.content = meta.meta_description;
            }
        }

        // --- Theme Handlers ---
        function initSystemTheme() {
            // Check if user has explicitly set theme in parent site
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
    </script>
</body>

</html>
